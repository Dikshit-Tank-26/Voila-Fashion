    <title>Voilà — Modern Fashion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body { font-family: 'Cormorant Garamond', Georgia, serif; background: #fff; color: #1A1A1A; -webkit-font-smoothing: antialiased; }
      input, button, select, textarea { font-family: inherit; }
      img { max-width: 100%; display: block; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #F9F7F4; }
      ::-webkit-scrollbar-thumb { background: #C4A882; border-radius: 3px; }
    </style>
